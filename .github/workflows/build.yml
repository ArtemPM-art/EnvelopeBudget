name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project EnvelopeBudget.xcodeproj \
            -scheme EnvelopeBudget \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: X-RAY - inspect app bundle
        run: |
          APP="build/Build/Products/Release-iphoneos/EnvelopeBudget.app"
          echo "===== BUNDLE CONTENTS ====="
          ls -la "$APP"
          echo "===== INFO.PLIST (readable) ====="
          plutil -p "$APP/Info.plist"
          echo "===== INFO.PLIST (valid?) ====="
          plutil -lint "$APP/Info.plist"
          echo "===== EXECUTABLE ====="
          file "$APP/EnvelopeBudget"

      - name: Package into IPA
        run: |
          rm -rf Payload
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/EnvelopeBudget.app Payload/
          find Payload -name '.DS_Store' -delete
          zip -qr EnvelopeBudget.ipa Payload
          echo "===== IPA CONTENTS ====="
          unzip -l EnvelopeBudget.ipa | head -30

      - name: Publish IPA to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: EnvelopeBudget.ipa
