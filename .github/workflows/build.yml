name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project EnvelopeBudget.xcodeproj \
            -scheme EnvelopeBudget \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package into IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/EnvelopeBudget.app Payload/
          zip -r EnvelopeBudget.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: EnvelopeBudget-ipa
          path: EnvelopeBudget.ipa
