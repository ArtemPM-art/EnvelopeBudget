name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project EnvelopeBudget.xcodeproj \
            -scheme EnvelopeBudget \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: INSPECT — что реально собралось
        run: |
          APP="build/Build/Products/Release-iphoneos/EnvelopeBudget.app"
          echo "===== СОДЕРЖИМОЕ ПРИЛОЖЕНИЯ ====="
          ls -la "$APP"
          echo "===== ПАСПОРТ (Info.plist) ====="
          plutil -p "$APP/Info.plist"
          echo "===== АРХИТЕКТУРА БИНАРНИКА ====="
          file "$APP/EnvelopeBudget"

      - name: Package into IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/EnvelopeBudget.app Payload/
          zip -r EnvelopeBudget.ipa Payload
          echo "===== ЧТО ВНУТРИ IPA ====="
          unzip -l EnvelopeBudget.ipa

      - name: Publish IPA to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: EnvelopeBudget.ipa
