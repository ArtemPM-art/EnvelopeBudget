name: EnvelopeBudget

options:
  bundleIdPrefix: com.artem
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  EnvelopeBudget:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Supporting/Info.plist
      properties:
        CFBundleName: EnvelopeBudget
        CFBundleDisplayName: Конверты
        CFBundleIdentifier: com.artem.envelopebudget
        CFBundleExecutable: EnvelopeBudget
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleInfoDictionaryVersion: "6.0"
        LSRequiresIPhoneOS: true
        MinimumOSVersion: "16.0"
        UIDeviceFamily: [1]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.artem.envelopebudget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
